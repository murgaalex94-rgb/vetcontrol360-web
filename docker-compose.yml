version: '3.8'

networks:
  vetcontrol-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  evolution_instances:

services:
  postgres:
    image: postgres:16-alpine
    container_name: vetcontrol-db
    restart: unless-stopped
    networks:
      - vetcontrol-network
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-vetcontrol}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vetcontrol123}
      POSTGRES_DB: ${DB_NAME:-vetcontrol_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-vetcontrol} -d ${DB_NAME:-vetcontrol_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vetcontrol-redis
    restart: unless-stopped
    networks:
      - vetcontrol-network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: vetcontrol-evolution-api
    restart: unless-stopped
    networks:
      - vetcontrol-network
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_NAME: vetcontrol
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: http://localhost:8080

      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${DB_USERNAME:-vetcontrol}:${DB_PASSWORD:-vetcontrol123}@postgres:5432/${DB_NAME:-vetcontrol_db}?schema=evolution_api
      DATABASE_CONNECTION_CLIENT_NAME: evolution_vetcontrol

      DATABASE_SAVE_DATA_INSTANCE: true
      DATABASE_SAVE_DATA_NEW_MESSAGE: false
      DATABASE_SAVE_MESSAGE_UPDATE: false
      DATABASE_SAVE_DATA_CONTACTS: false
      DATABASE_SAVE_DATA_CHATS: false
      DATABASE_SAVE_DATA_HISTORIC: false

      CACHE_REDIS_ENABLED: true
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_SAVE_INSTANCES: true
      CACHE_REDIS_PREFIX_KEY: evolution_vetcontrol

      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-change-me-to-a-random-uuid}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: true

      CORS_ORIGIN: "*"
      CORS_METHODS: GET,POST,PUT,DELETE
      CORS_CREDENTIALS: true

      LOG_LEVEL: ERROR,WARN,INFO
      LOG_BAILEYS: error
      LOG_COLOR: false

      DEL_INSTANCE: false
      QRCODE_LIMIT: 30
      LANGUAGE: es
    volumes:
      - evolution_instances:/evolution/instances
